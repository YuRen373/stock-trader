services:
  opensearch-init:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-init
    user: "0"
    command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
    volumes:
      - ./data:/usr/share/opensearch/data

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-finance
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@12345
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:Admin@12345 https://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      opensearch-init:
        condition: service_completed_successfully

  backend:
    build: ./backend
    container_name: stock-trader-backend
    ports:
      - "8000:8000"
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=Admin@12345
      - OPENSEARCH_SCHEME=https
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: stock-trader-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
